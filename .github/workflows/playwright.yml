name: Playwright Tests

# When should this workflow run?
on:
  push:
    branches: [main, master]        # run on every push to main/master
  pull_request:
    branches: [main, master]        # run on PRs targeting main/master
  workflow_dispatch:                 # also allow running it manually from the Actions tab

jobs:
  test:
    name: Run Playwright Suite
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code from the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'              # cache npm downloads to speed up future runs

      # 3. Install project dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright browsers + their OS dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # 5. Run the test suite
      #    GitHub sets CI=true automatically, so the config's retries + forbidOnly kick in
      - name: Run Playwright tests
        run: npx playwright test

      # 6. Upload the HTML report so you can download & view it from the run
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}      # upload even when tests fail
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
